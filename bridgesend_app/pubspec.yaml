publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  file_picker: ^8.0.0
  path_provider: ^2.1.2
  provider: ^6.1.1
  intl: ^0.19.0
  flutter_blue_plus: ^2.3.4
  webrtc_interface: ^1.5.1
  dart_webrtc: ^1.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
